    filter: brightness(0.72) saturate(1.1);
    z-index: 0;
    transition: filter 0.6s ease;
  }
  /* Vignette overlay */
  #bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(10,0,5,0.65) 100%);
  }

  /* ── CANVAS FOR PARTICLES ── */
  #canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* ── MAIN HEART ── */
  #heart-wrap {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .mega-heart {
    position: relative;
    width: 260px;
    height: 260px;
    animation: heartbeat 2.4s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(255,78,122,0.7)) drop-shadow(0 0 80px rgba(255,78,122,0.35));
  }

  .mega-heart svg {
    width: 100%;
    height: 100%;
  }

  /* Liquid fill gradient heart */
  .heart-fill {
    fill: url(#heartGrad);
  }

  @keyframes heartbeat {
    0%   { transform: scale(1);    filter: drop-shadow(0 0 30px rgba(255,78,122,0.7)) drop-shadow(0 0 80px rgba(255,78,122,0.35)); }
    14%  { transform: scale(1.12); filter: drop-shadow(0 0 50px rgba(255,78,122,0.9)) drop-shadow(0 0 120px rgba(255,78,122,0.5)); }
    28%  { transform: scale(1);    filter: drop-shadow(0 0 30px rgba(255,78,122,0.7)) drop-shadow(0 0 80px rgba(255,78,122,0.35)); }
    42%  { transform: scale(1.07); filter: drop-shadow(0 0 40px rgba(255,78,122,0.8)) drop-shadow(0 0 100px rgba(255,78,122,0.4)); }
    70%  { transform: scale(1);    filter: drop-shadow(0 0 30px rgba(255,78,122,0.7)) drop-shadow(0 0 80px rgba(255,78,122,0.35)); }
    100% { transform: scale(1);    filter: drop-shadow(0 0 30px rgba(255,78,122,0.7)) drop-shadow(0 0 80px rgba(255,78,122,0.35)); }
  }

  /* Shimmer ring around heart */
  .ring {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    border: 2px solid rgba(255,200,180,0.25);
    animation: ringPulse 2.4s ease-in-out infinite;
  }
  .ring:nth-child(2) { inset: -40px; animation-delay: 0.3s; opacity: 0.5; }
  .ring:nth-child(3) { inset: -65px; animation-delay: 0.6s; opacity: 0.25; }

  @keyframes ringPulse {
    0%, 100% { transform: scale(0.95); opacity: 0.0; }
    50%       { transform: scale(1.05); opacity: 1; }
  }

  /* Orbiting tiny hearts */
  .orbit {
    position: absolute;
    inset: 0;
    animation: orbitSpin 6s linear infinite;
  }
  .orbit:nth-child(4) { animation-duration: 8s; animation-direction: reverse; }
  .orbit:nth-child(5) { animation-duration: 5s; }

  .orbit-dot {
    position: absolute;
    top: -10px;
    left: calc(50% - 8px);
    font-size: 16px;
    filter: drop-shadow(0 0 6px rgba(255,78,122,0.9));
  }

  @keyframes orbitSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ── TITLE TEXT ── */
  #title {
    position: fixed;
    top: 10%;
    width: 100%;
    text-align: center;
    z-index: 3;
    pointer-events: none;
    animation: fadeDown 1.2s ease both;
  }
  #title h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 2rem;
    color: #fff;
    letter-spacing: 0.05em;
    text-shadow: 0 2px 20px rgba(255,78,122,0.8), 0 0 60px rgba(255,78,122,0.4);
  }
  #title p {
    font-size: 0.85rem;
    color: rgba(255,230,220,0.75);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 6px;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── BUTTON ── */
  #love-btn {
    position: fixed;
    bottom: 52px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: linear-gradient(135deg, rgba(255,78,122,0.25), rgba(255,150,100,0.18));
    border: 1.5px solid rgba(255,180,160,0.55);
    color: #fff;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.05rem;
    letter-spacing: 0.08em;
    padding: 14px 36px;
    border-radius: 50px;
    cursor: pointer;
    backdrop-filter: blur(12px) saturate(1.5);
    -webkit-backdrop-filter: blur(12px) saturate(1.5);
    white-space: nowrap;
    box-shadow: 0 0 24px rgba(255,78,122,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    animation: fadeUp 1.4s 0.5s ease both;
  }
  #love-btn:active {
    transform: translateX(-50%) scale(0.95);
    box-shadow: 0 0 40px rgba(255,78,122,0.6);
    background: linear-gradient(135deg, rgba(255,78,122,0.45), rgba(255,120,80,0.35));
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── LOVE NOTE CARDS ── */
  .note-card {
    position: fixed;
    z-index: 20;
    max-width: 78vw;
    background: linear-gradient(145deg, rgba(255,245,240,0.18), rgba(255,200,180,0.12));
    border: 1px solid rgba(255,200,180,0.4);
    backdrop-filter: blur(18px) saturate(1.8);
    -webkit-backdrop-filter: blur(18px) saturate(1.8);
    border-radius: 20px;
    padding: 18px 22px;
    color: #fff;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    line-height: 1.6;
    text-align: center;
    box-shadow: 0 8px 40px rgba(255,78,122,0.2), inset 0 1px 0 rgba(255,255,255,0.12);
    pointer-events: none;
    animation: noteAppear 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .note-card .note-icon {
    display: block;
    font-size: 1.4rem;
    margin-bottom: 6px;
  }
  @keyframes noteAppear {
    from { opacity: 0; transform: scale(0.7) translateY(30px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes noteDisappear {
    from { opacity: 1; transform: scale(1) translateY(0); }
    to   { opacity: 0; transform: scale(0.85) translateY(-25px); }
  }

  /* ── FLOATING MINI HEARTS (CSS) ── */
  .float-heart {
    position: fixed;
    bottom: -60px;
    font-size: 1.2rem;
    pointer-events: none;
    z-index: 5;
    animation: floatUp linear forwards;
    filter: drop-shadow(0 0 6px rgba(255,78,122,0.7));
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.9; }
    80%  { opacity: 0.6; }
    100% { transform: translateY(-110vh) rotate(30deg) scale(0.4); opacity: 0; }
  }

  /* Photo credit hint */
  #hint {
    position: fixed;
    bottom: 14px;
    width: 100%;
    text-align: center;
    z-index: 3;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- Background -->
<div id="bg"></div>

<!-- Particle canvas -->
<canvas id="canvas"></canvas>

<!-- Title -->
<div id="title">
  <h1>You & Me</h1>
  <p>forever & always</p>
</div>

<!-- Heart -->
<div id="heart-wrap">
  <div class="mega-heart">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="orbit"><span class="orbit-dot">🤍</span></div>
    <div class="orbit"><span class="orbit-dot">✨</span></div>
    <svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#ff6b9d"/>
          <stop offset="50%"  stop-color="#ff3366"/>
          <stop offset="100%" stop-color="#c0115e"/>
        </linearGradient>
        <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="rgba(255,255,255,0)" />
          <stop offset="50%"  stop-color="rgba(255,255,255,0.25)" />
          <stop offset="100%" stop-color="rgba(255,255,255,0)" />
          <animateTransform attributeName="gradientTransform" type="translate" from="-200 0" to="200 0" dur="2.5s" repeatCount="indefinite"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="heartClip">
          <path d="M100 160 C100 160 20 110 20 60 C20 30 40 10 65 10 C80 10 93 20 100 30 C107 20 120 10 135 10 C160 10 180 30 180 60 C180 110 100 160 100 160Z"/>
        </clipPath>
      </defs>
      <!-- Main heart -->
      <path d="M100 160 C100 160 20 110 20 60 C20 30 40 10 65 10 C80 10 93 20 100 30 C107 20 120 10 135 10 C160 10 180 30 180 60 C180 110 100 160 100 160Z"
            class="heart-fill" filter="url(#glow)"/>
      <!-- Shimmer sweep -->
      <rect x="0" y="0" width="200" height="180" fill="url(#shimmer)" clip-path="url(#heartClip)"/>
      <!-- Inner glow highlight -->
      <ellipse cx="78" cy="48" rx="22" ry="15" fill="rgba(255,255,255,0.18)" transform="rotate(-30 78 48)"/>
    </svg>
  </div>
</div>

<!-- Button -->
<button id="love-btn" onclick="showNote()">✦ 💖 ✦</button>
 
</div>

<script>
// ── LOVE NOTES ──
const notes = [
  { icon: "🌹", text: "Gülüüümmmmm" },
  { icon: "✨", text: "Seninle olmak, son derece zevkli ve harika bir şeydir ki, henüz yapmadım." },
  { icon: "🌙", text: " Ay parçamm" },
  { icon: "💫", text: "Kaaaainat gözəli balamm" },
  { icon: "🌸", text: "Saaa qurrvann olumm" },
  { icon: "🔥", text: "Ömmmmrüüüümmm" },
  { icon: "🌊", text: "Dalğalı saçlarına da, sa da qurvann olummm" },
  { icon: "⭐", text: "Balamınn dodaxxxları balldddı baalll" },
  { icon: "💎", text: "Ayysseeelimmm" },
];

let noteIndex = 0;
let activeNote = null;
let noteTimeout = null;

function showNote() {
  if (activeNote) {
    activeNote.style.animation = 'noteDisappear 0.35s ease forwards';
    clearTimeout(noteTimeout);
    setTimeout(() => activeNote && activeNote.remove(), 350);
  }

  const note = notes[noteIndex % notes.length];
  noteIndex++;

  const el = document.createElement('div');
  el.className = 'note-card';
  el.innerHTML = `<span class="note-icon">${note.icon}</span>${note.text}`;

  // Random position: avoid button area
  const top = 20 + Math.random() * 42;
  const left = 6 + Math.random() * 14;
  el.style.top = top + '%';
  el.style.left = left + 'vw';
  el.style.maxWidth = '78vw';

  document.body.appendChild(el);
  activeNote = el;

  // Launch mini hearts on button press
  for (let i = 0; i < 6; i++) {
    setTimeout(() => spawnFloatHeart(), i * 120);
  }

  noteTimeout = setTimeout(() => {
    if (el.parentNode) {
      el.style.animation = 'noteDisappear 0.6s ease forwards';
      setTimeout(() => el.remove(), 600);
    }
  }, 9999999);
}

// ── FLOAT HEARTS ──
const heartEmojis = ['🤍','💗','💓','💖','💝','💞','✨'];
function spawnFloatHeart() {
  const el = document.createElement('div');
  el.className = 'float-heart';
  el.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
  el.style.left = (10 + Math.random() * 80) + 'vw';
  el.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
  const dur = 3.5 + Math.random() * 3;
  el.style.animationDuration = dur + 's';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000);
}

// Auto-float hearts every few seconds
setInterval(() => spawnFloatHeart(), 1800);

// ── PARTICLE SYSTEM (canvas) ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
const MAX_PARTICLES = 38;

function heartPath(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(size / 30, size / 30);
  ctx.beginPath();
  ctx.moveTo(0, -8);
  ctx.bezierCurveTo(0, -16, -14, -16, -14, -5);
  ctx.bezierCurveTo(-14, 5, 0, 14, 0, 22);
  ctx.bezierCurveTo(0, 14, 14, 5, 14, -5);
  ctx.bezierCurveTo(14, -16, 0, -16, 0, -8);
  ctx.closePath();
  ctx.restore();
}

function createParticle() {
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 4 + Math.random() * 9,
    speedX: (Math.random() - 0.5) * 0.6,
    speedY: -0.3 - Math.random() * 0.5,
    opacity: 0.1 + Math.random() * 0.4,
    hue: 340 + Math.random() * 30,
  };
}

for (let i = 0; i < MAX_PARTICLES; i++) {
  const p = createParticle();
  p.y = Math.random() * canvas.height;
  particles.push(p);
}

function animateCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach((p, i) => {
    p.x += p.speedX;
    p.y += p.speedY;
    p.opacity -= 0.0008;

    if (p.y < -20 || p.opacity <= 0) {
      particles[i] = createParticle();
      particles[i].y = canvas.height + 10;
    }

    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle = `hsl(${p.hue}, 90%, 65%)`;
    heartPath(p.x, p.y, p.size);
    ctx.fill();
    ctx.restore();
  });
  requestAnimationFrame(animateCanvas);
}
animateCanvas();

// Resize
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
